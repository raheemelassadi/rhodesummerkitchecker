name: Stock Check

on:
  schedule:
    - cron: '0 8,20 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-stock.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
